<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anna Gen 2 — VRM Viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="viewer"></div>
      <div id="dev-tools">
        <button id="dev-toggle">Dev</button>
        <div id="dev-panel" style="display:none">
          <div class="ui-row">
            <select id="model-select"></select>
            <input id="url" placeholder="or paste a custom URL" />
            <button id="load">Load VRM</button>
          </div>
          <div class="ui-row">
            <input id="speech-text" placeholder="Type something to say…" />
            <button id="speak">Speak</button>
          </div>
          <div class="ui-row" id="mood-buttons"></div>
        </div>
      </div>
      <div id="chat-panel">
        <div id="chat-log"></div>
        <div id="chat-input-row">
          <input id="chat-input" placeholder="Say something to Anna…" />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
