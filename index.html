<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anna Gen 2 — VRM Viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="viewer"></div>
      <div id="ui">
        <div class="ui-row">
          <input id="url" placeholder="/models/AvatarSample_A.vrm or remote URL" />
          <button id="load">Load VRM</button>
        </div>
        <div class="ui-row">
          <input id="speech-text" placeholder="Type something to say…" />
          <button id="speak">Speak</button>
        </div>
        <div class="ui-row" id="mood-buttons"></div>
      </div>
      <div id="chat-panel">
        <div id="login-form">
          <input id="login-user" placeholder="Username" autocomplete="username" />
          <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="login-btn">Login</button>
          <span id="login-status"></span>
        </div>
        <div id="chat-log"></div>
        <div id="chat-input-row" style="display:none">
          <input id="chat-input" placeholder="Say something to Anna…" />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
