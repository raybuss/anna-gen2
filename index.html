<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Anna Gen 2 — VRM Viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="viewer"></div>
      <div id="ui">
        <div class="ui-row">
          <input id="url" placeholder="/models/AvatarSample_A.vrm or remote URL" />
          <button id="load">Load VRM</button>
        </div>
        <div class="ui-row">
          <input id="speech-text" placeholder="Type something to say…" />
          <button id="speak">Speak</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
